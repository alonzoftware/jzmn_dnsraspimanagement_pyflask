<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS RasPi Management - Top Talkers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body class="dashboard-body">

    <nav class="navbar">
        <div class="nav-brand">
            <img src="{{ url_for('static', filename='img/DNSRaspiManagementLogo512x512.png') }}" alt="Logo"
                class="nav-logo">
            <h2>DNS RasPi Management</h2>
        </div>

        <div class="nav-links">
            <a href="{{ url_for('dashboard.dashboard') }}"
                class="nav-link {% if request.endpoint == 'dashboard.dashboard' %}active{% endif %}">
                Dashboard
            </a>
            <a href="{{ url_for('dashboard.top_talkers') }}"
                class="nav-link {% if request.endpoint == 'dashboard.top_talkers' %}active{% endif %}">
                Top Talkers & Domains
            </a>
        </div>

        <div class="nav-actions">
            <a href="{{ url_for('auth.login') }}" class="btn-logout">Logout</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="section-title">
            <h3>Top Talkers & Domains</h3>
        </div>

        <div class="chart-card wide"
            style="min-height: 400px; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 16px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="color: var(--text-secondary); opacity: 0.5;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p style="color: var(--text-secondary);">Module pending implementation...</p>
        </div>
    </main>

</body>

</html>
